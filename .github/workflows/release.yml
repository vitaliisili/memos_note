name: Build & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build editor bundle
        run: npm run build

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(grep '"version"' manifest.json | head -1 | sed 's/.*"version": *"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Package extension
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          mkdir -p dist
          cp manifest.json background.js popup.html popup.js popup.css dist/
          mkdir -p dist/lib dist/icons
          cp lib/editor.bundle.js lib/marked.min.js lib/purify.min.js dist/lib/
          cp icons/icon16.png icons/icon48.png icons/icon128.png dist/icons/
          cd dist && zip -r ../memos-notes-v${{ steps.version.outputs.version }}.zip .

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Memos Notes ${{ steps.version.outputs.tag }}
          body: |
            ## Memos Notes ${{ steps.version.outputs.tag }}

            Download `memos-notes-v${{ steps.version.outputs.version }}.zip` and upload it to the [Chrome Web Store Developer Dashboard](https://chrome.google.com/webstore/devconsole).

            Or load it as an unpacked extension for testing.
          files: memos-notes-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
